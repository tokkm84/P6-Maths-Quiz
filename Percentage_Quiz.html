                    { text: "200", rationale: "Total Unchanged! Imagine a pizza with 20 slices; if you swap pepperoni for cheese, you still have 20 slices! Before: R:B:Total = 40:60:100 = 2:3:5 (or 8:12:20 units). After: R:B:Total = 25:75:100 = 1:3:4 (or 5:15:20 units). The total units (20u) are the same. Red went from 8u to 5u, a drop of 3u. 3u = 30 markers, so 1u = 10. Total markers = 20u × 10 = 200.", isCorrect: true },
                    { text: "250", rationale: "This assumes the total units changed after the trade, but the total number of markers remained the same.", isCorrect: false }
                ],
                hint: "This is a 'Total Unchanged' problem. Think of a box of 20 chocolates—if you swap a dark chocolate for a white chocolate, you still have 20 chocolates! Make the Total ratio units the same for both the Before and After."
            },
            {
                questionNumber: 27, question: "Alice and Betty had some money. Alice's money was 40% of Betty's money. After they bought the same tuition bag and spent $60 each, Alice's money became 25% of Betty's money. How much money did Alice have at first?", level: 3, marks: 3, calculator: true,
                options: [
                    { text: "$150", rationale: "This is the difference in their money, not the amount Alice had at first.", isCorrect: false },
                    { text: "$120", rationale: "Difference Unchanged! Think of an age gap: if one sister is 3 years older, she will always be 3 years older! Before: A:B = 40:100 = 2:5 (Difference is 3u). After: A:B = 25:100 = 1:4 (Difference is 3u). Since the difference is already matched at 3u, we compare Alice directly: Alice went from 2u to 1u. 1u = $60. Alice at first = 2u × $60 = $120.", isCorrect: true },
                    { text: "$300", rationale: "This is the amount of money Betty had at first.", isCorrect: false },
                    { text: "$60", rationale: "This is the amount Alice had left AFTER spending the money.", isCorrect: false }
                ],
                hint: "This is a 'Constant Difference' problem. Since they spent the EXACT same amount ($60), the gap between their money stays the same. Match the difference in units before and after!"
            },
            {
                questionNumber: 28, question: "There was a total of 440 people in a park. 25% of them were women. When some men left the park, the percentage of women increased to 55%. How many men left the park?", level: 3, marks: 3, calculator: true,
                options: [
                    { text: "110", rationale: "This is the number of women in the park, which did not change.", isCorrect: false },
                    { text: "240", rationale: "Women = 25% of 440 = 110. Women unchanged. New total: 55% -> 110, so 100% -> 200. Men originally = 440 - 110 = 330. Men now = 200 - 110 = 90. Men left = 330 - 90 = 240.", isCorrect: true },
                    { text: "200", rationale: "This is the NEW total number of people in the park after the men left.", isCorrect: false },
                    { text: "90", rationale: "This is the number of men remaining in the park, not the number who left.", isCorrect: false }
                ],
                hint: "This is a 'Single Unchanged' problem. The number of women did not change. Find the actual number of women first, then use it to find the new total number of people."
            },
            {
                questionNumber: 29, question: "During a sale, Mrs Tan bought a refrigerator at a discount of 15%. She had to pay a GST of 9% on the discounted price. The original price was $1800. How much did she pay in total?", level: 3, marks: 3, calculator: true,
                options: [
                    { text: "$1692.00", rationale: "This error occurs by taking 15% off $1800, then adding 9% of $1800 instead of 9% of the discounted price.", isCorrect: false },
                    { text: "$1530.00", rationale: "This is the price after the discount, but before the GST is added.", isCorrect: false },
                    { text: "$1667.70", rationale: "Discounted price = 0.85 × 1800 = 1530. GST = 0.09 × 1530 = 137.70. Total = 1530 + 137.70 = 1667.70.", isCorrect: true },
                    { text: "$1962.00", rationale: "This calculates a 9% GST on $1800, without taking the 15% discount.", isCorrect: false }
                ],
                hint: "Always apply GST to the price AFTER the discount has been deducted."
            },
            {
                questionNumber: 30, question: "A baker baked some chocolate and vanilla cupcakes. If he sells 30 chocolate cupcakes, the number of chocolate cupcakes left will be 20% of the total cupcakes left. If he sells 30 vanilla cupcakes instead, the number of chocolate cupcakes will be 40% of the total cupcakes left. How many chocolate cupcakes did he bake?", level: 3, marks: 3, calculator: true,
                options: [
                    { text: "120", rationale: "This is the number of vanilla cupcakes baked.", isCorrect: false },
                    { text: "60", rationale: "Two Scenarios! Scenario 1 (Sell 30 Choc): Choc left is 20%, so Van is 80%. Ratio C:V = 1:4. Vanilla = 4 × (C - 30) = 4C - 120. Scenario 2 (Sell 30 Van): Choc is 40%, Van left is 60%. Ratio C:V = 2:3. Van left = (3 × C) ÷ 2. We equate the vanilla units and solve to find C = 60.", isCorrect: true },
                    { text: "90", rationale: "This is a calculation error caused by mixing up the percentages of the remainders.", isCorrect: false },
                    { text: "180", rationale: "This is the TOTAL number of cupcakes baked, not just the chocolate ones.", isCorrect: false }
                ],
                hint: "This is a 'Two Scenarios' problem. Imagine two parallel universes! Write down the before and after units for each universe separately, then find a way to link them together using the cupcakes that weren't sold."
            }
        ];

        // Helper to call Gemini API with retry logic
        const callGeminiAPI = async (prompt) => {
            const isPreview = !apiKey || apiKey.trim() === "";
            
            let url;
            let requestBody;

            if (isPreview) {
                // PREVIEW MODE: Uses the Canvas environment's required model and format
               url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                requestBody = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { 
                        parts: [{ text: "You are Hachiware, a cute, encouraging math tutor for 12-year-old students taking the PSLE Math exam. Your goal is to explain concepts to weaker students in the simplest way possible. Base your explanations on standard PSLE heuristics (e.g., Unitary Method / finding 1%, identifying the 100% Whole, Single Unchanged Variable, Total Unchanged). Use a friendly tone and emojis." }] 
                    }
                };
            } else {
                // LOCAL MODE: Uses the standard public model with your real API key
                url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                // We combine the instructions directly into the text to prevent "Invalid JSON / systemInstruction" errors on standard keys
                const fullPrompt = "You are Hachiware, a cute, encouraging math tutor for 12-year-old students taking the PSLE Math exam. Your goal is to explain concepts to weaker students in the simplest way possible. Base your explanations on standard PSLE heuristics (e.g., Unitary Method / finding 1%, identifying the 100% Whole). Use a friendly tone and emojis.\n\nSTUDENT QUESTION / CONTEXT:\n" + prompt;
                
                requestBody = {
                    contents: [{ parts: [{ text: fullPrompt }] }]
                };
            }

            let retries = 3;
            let delay = 1000;
            let errorMessage = "";

            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(requestBody)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (error) {
                    errorMessage = error.message;
                    
                    // Fallback to an older reliable model if the first public one is "not found"
                    if (!isPreview && errorMessage.includes("not found")) {
                        url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.0-pro:generateContent?key=${apiKey}`;
                    }

                    retries--;
                    if (retries === 0) {
                        return `Oh no! My brain is a little fuzzy right now. (Error: ${errorMessage}). 😿`;
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        };

        function App() {
            // Memoize and shuffle the quiz data on load so it stays consistent during a single attempt
            const quizData = useMemo(() => {
                const shuffleArray = (array) => {
                    const shuffled = [...array];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    return shuffled;
                };

                // Helper to shuffle the choices within each question
                const shuffleOptions = (questions) => {
                    return questions.map(q => ({
                        ...q,
                        options: shuffleArray(q.options)
                    }));
                };

                // Filter by level and shuffle the options for every question
                const level1 = shuffleOptions(sourceQuizData.filter(q => q.level === 1));
                const level2 = shuffleOptions(sourceQuizData.filter(q => q.level === 2));
                const level3 = shuffleOptions(sourceQuizData.filter(q => q.level === 3));

                return [
                    ...shuffleArray(level1),
                    ...shuffleArray(level2),
                    ...shuffleArray(level3)
                ];
            }, []);

            const [studentName, setStudentName] = useState("");
            const [hasStarted, setHasStarted] = useState(false);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [answers, setAnswers] = useState(new Array(quizData.length).fill(null));
            
            // Timer State
            const [elapsedSeconds, setElapsedSeconds] = useState(0);

            // Hint State
            const [showHint, setShowHint] = useState(false);
            const [isAiHintLoading, setIsAiHintLoading] = useState(false);
            const [aiHintText, setAiHintText] = useState("");

            // Review State
            const [isFinished, setIsFinished] = useState(false);
            const [showReview, setShowReview] = useState(false);
            const [aiExplanations, setAiExplanations] = useState({});
            const [isAiExplanationLoading, setIsAiExplanationLoading] = useState({});
            const [autoSubmitted, setAutoSubmitted] = useState(false);

            const maxScore = quizData.reduce((acc, curr) => acc + curr.marks, 0);

            // Timer Effect
            useEffect(() => {
                let interval = null;
                if (hasStarted && !isFinished) {
                    interval = setInterval(() => {
                        setElapsedSeconds(prev => prev + 1);
                    }, 1000);
                } else {
                    clearInterval(interval);
                }
                return () => clearInterval(interval);
            }, [hasStarted, isFinished]);

            // Background Auto-Submit Effect
            useEffect(() => {
                if (isFinished && !autoSubmitted) {
                    // Calculate score immediately upon finishing
                    let finalScore = 0;
                    answers.forEach((ansIndex, qIndex) => {
                        if (ansIndex !== null && quizData[qIndex].options[ansIndex].isCorrect) {
                            finalScore += quizData[qIndex].marks;
                        }
                    });
                    
                    const minutes = Math.floor(elapsedSeconds / 60);
                    const seconds = elapsedSeconds % 60;
                    const timeTaken = `${minutes}:${seconds.toString().padStart(2, '0')}`;

                    // Convert Google Form view URL to response submission URL
                    const submitUrl = GOOGLE_FORM_BASE_URL.replace('/viewform', '/formResponse');
                    const formData = new FormData();
                    formData.append(GOOGLE_FORM_NAME_ENTRY, studentName);
                    formData.append(GOOGLE_FORM_SCORE_ENTRY, finalScore.toString());
                    formData.append(GOOGLE_FORM_TIME_ENTRY, timeTaken);

                    // Send data silently in the background
                    fetch(submitUrl, {
                        method: 'POST',
                        mode: 'no-cors', // Required to bypass cross-origin restrictions for Google Forms
                        body: formData
                    }).then(() => {
                        setAutoSubmitted(true);
                    }).catch((error) => {
                        console.error("Form auto-submission error", error);
                        setAutoSubmitted(true); // Prevent infinite retry loops if it fails
                    });
                }
            }, [isFinished, autoSubmitted, answers, quizData, elapsedSeconds, studentName]);

            // Format seconds to MM:SS
            const formatTime = (totalSeconds) => {
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                return `${minutes}:${seconds.toString().padStart(2, '0')}`;
            };

            const calculateScore = () => {
                let score = 0;
                answers.forEach((ansIndex, qIndex) => {
                    if (ansIndex !== null && quizData[qIndex].options[ansIndex].isCorrect) {
                        score += quizData[qIndex].marks;
                    }
                });
                return score;
            };

            const handleStart = (e) => {
                e.preventDefault();
                if (studentName.trim().length > 0) {
                    setHasStarted(true);
                }
            };

            const handleSelectOption = (index) => {
                const newAnswers = [...answers];
                newAnswers[currentQuestionIndex] = index;
                setAnswers(newAnswers);
            };

            const resetHintState = () => {
                setShowHint(false);
                setAiHintText("");
                setIsAiHintLoading(false);
            };

            const handleNext = () => {
                resetHintState();
                if (currentQuestionIndex < quizData.length - 1) {
                    setCurrentQuestionIndex(currentQuestionIndex + 1);
                } else {
                    setIsFinished(true);
                }
            };

            const handlePrevious = () => {
                resetHintState();
                if (currentQuestionIndex > 0) {
                    setCurrentQuestionIndex(currentQuestionIndex - 1);
                }
            };

            // Feature 1: Generate AI Hint
            const handleAskHachiwareForHint = async () => {
                if (aiHintText) return; 

                setIsAiHintLoading(true);
                const q = quizData[currentQuestionIndex];
                
                const prompt = `The student is currently stuck on this PSLE Math question: "${q.question}". 
                They have already been given this basic hint: "${q.hint}".
                Provide a very simple, encouraging alternative hint that guides them to the FIRST step. 
                Apply standard PSLE Math percentage strategies (like identifying the 100% 'whole', using the unitary method to find 1%, or checking for unchanged variables). 
                Use extremely simple language suitable for a weaker student. Do NOT give away the final answer. Keep it under 3 sentences.`;
                
                const responseText = await callGeminiAPI(prompt);
                if (responseText) setAiHintText(responseText);
                setIsAiHintLoading(false);
            };

            // Feature 2: Generate Story Explanation
            const handleAskHachiwareForStory = async (questionIndex) => {
                setIsAiExplanationLoading(prev => ({ ...prev, [questionIndex]: true }));
                
                const q = quizData[questionIndex];
                const correctOption = q.options.find(opt => opt.isCorrect);
                
                const prompt = `The student got this math question wrong: "${q.question}". 
                The correct answer is "${correctOption.text}". 
                Explain the solution step-by-step using a fun, very simple story (involving animals, everyday objects, or Chiikawa characters). 
                Ensure the math logic aligns with PSLE methods (like finding 100% first, unitary method, or model drawing concepts). 
                Use highly simplified language so a weaker student can easily follow the logic. Keep it under 5 sentences.`;
                
                const responseText = await callGeminiAPI(prompt);
                
                if (responseText) {
                    setAiExplanations(prev => ({ ...prev, [questionIndex]: responseText }));
                }
                setIsAiExplanationLoading(prev => ({ ...prev, [questionIndex]: false }));
            };

            const submitToWhatsApp = () => {
                const score = calculateScore();
                const timeTaken = formatTime(elapsedSeconds);
                const text = `Hi Teacher! I am ${studentName}. I just completed the PSLE Math Percentages Quiz in ${timeTaken} and scored ${score}/${maxScore} marks!`;
                const whatsappUrl = `https://api.whatsapp.com/send?phone=${TEACHER_WHATSAPP_NUMBER}&text=${encodeURIComponent(text)}`;
                window.open(whatsappUrl, '_blank');
            };

            // ----------------------------------------------------------------
            // SCREEN 1: WELCOME SCREEN
            // ----------------------------------------------------------------
            if (!hasStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-xl shadow-lg p-8 space-y-6">
                            <div className="text-center">
                                <div className="relative inline-block">
                                    <img 
                                        src={MASCOT_IMAGE_URL} 
                                        alt="Math Mascot" 
                                        className="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-blue-100 shadow-sm object-cover"
                                    />
                                    <div className="absolute -top-2 -right-2 bg-yellow-100 p-1.5 rounded-full shadow-sm">
                                        <Icon name="sparkles" size={16} className="text-yellow-600" />
                                    </div>
                                </div>
                                <h1 className="text-2xl font-bold text-slate-800">PSLE Math Mastery</h1>
                                <p className="text-slate-500 mt-2">Topic: Percentages & Ratios</p>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg text-sm text-slate-600 space-y-2">
                                <p><strong>Level 1 (Basic):</strong> 1 Mark each, No Calculator</p>
                                <p><strong>Level 2 (Intermediate):</strong> 2 Marks each, No Calculator</p>
                                <p><strong>Level 3 (Advanced):</strong> 3 Marks each, Calculator Allowed</p>
                                <p className="pt-2 font-semibold text-blue-800 flex items-center">
                                    <Icon name="sparkles" size={14} className="mr-1" />
                                    Powered by Hachiware AI Tutor!
                                </p>
                            </div>

                            <form onSubmit={handleStart} className="space-y-4">
                                <div>
                                    <label htmlFor="name" className="block text-sm font-medium text-slate-700">Student Name</label>
                                    <input 
                                        type="text" 
                                        id="name" 
                                        required
                                        className="mt-1 block w-full px-4 py-3 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                                        placeholder="Enter your name to begin..."
                                        value={studentName}
                                        onChange={(e) => setStudentName(e.target.value)}
                                    />
                                </div>
                                <button 
                                    type="submit" 
                                    className="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
                                >
                                    Start Quiz
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // ----------------------------------------------------------------
            // SCREEN 3: RESULTS & REVIEW SCREEN
            // ----------------------------------------------------------------
            if (isFinished) {
                const score = calculateScore();
                const percentage = Math.round((score / maxScore) * 100);
                const timeTaken = formatTime(elapsedSeconds);
                
                return (
                    <div className="min-h-screen p-4 py-8">
                        <div className="max-w-2xl mx-auto space-y-6">
                            
                            <div className="bg-white rounded-xl shadow-lg p-8 text-center space-y-6">
                                <div className="flex flex-col items-center justify-center space-y-4 mb-2">
                                    <img 
                                        src={MASCOT_IMAGE_URL} 
                                        alt="Math Mascot" 
                                        className="w-20 h-20 rounded-full border-4 border-blue-50 shadow-sm object-cover"
                                    />
                                    <h2 className="text-3xl font-bold text-slate-800">Great job, {studentName}!</h2>
                                </div>
                                
                                <div className="relative inline-flex items-center justify-center">
                                    <svg className="w-32 h-32 transform -rotate-90">
                                        <circle cx="64" cy="64" r="60" className="text-slate-100" strokeWidth="8" fill="transparent" stroke="currentColor" />
                                        <circle 
                                            cx="64" cy="64" r="60" 
                                            className={`${percentage >= 75 ? 'text-green-500' : percentage >= 50 ? 'text-yellow-500' : 'text-red-500'}`} 
                                            strokeWidth="8" fill="transparent" strokeDasharray={377} strokeDashoffset={377 - (377 * percentage) / 100} stroke="currentColor" 
                                            strokeLinecap="round"
                                        />
                                    </svg>
                                    <div className="absolute flex flex-col items-center justify-center">
                                        <span className="text-3xl font-bold text-slate-700">{score}</span>
                                        <span className="text-sm text-slate-500">out of {maxScore}</span>
                                    </div>
                                </div>

                                <div className="flex justify-center items-center space-x-2 text-slate-600 bg-slate-50 py-2 px-4 rounded-lg inline-flex mx-auto border border-slate-100">
                                    <Icon name="clock" size={18} />
                                    <span className="font-medium">Time Taken: {timeTaken}</span>
                                </div>

                                <p className="text-lg text-slate-600">
                                    {percentage >= 75 ? "Excellent work! You have a strong grasp of Percentages." : 
                                     percentage >= 50 ? "Good effort! Review the mistakes to perfect your understanding." : 
                                     "Keep practicing! Read the explanations below to learn from your mistakes."}
                                </p>

                                {/* Auto-Submit Status Indicator */}
                                <div className="mt-4 p-3 bg-blue-50 rounded-lg border border-blue-100 max-w-sm mx-auto">
                                    {autoSubmitted ? (
                                        <p className="text-sm text-green-700 font-medium flex items-center justify-center">
                                            <Icon name="check-circle" size={18} className="mr-2 text-green-600" />
                                            Results securely submitted to Teacher!
                                        </p>
                                    ) : (
                                        <p className="text-sm text-blue-700 font-medium flex items-center justify-center">
                                            <Icon name="loader" size={18} className="mr-2 animate-spin text-blue-600" />
                                            Submitting results to Teacher...
                                        </p>
                                    )}
                                </div>

                                <div className="flex flex-col sm:flex-row gap-4 justify-center pt-4 border-t border-slate-100">
                                    <button 
                                        onClick={submitToWhatsApp}
                                        className="flex items-center justify-center px-6 py-3 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 transition-colors"
                                    >
                                        <Icon name="send" size={18} className="mr-2" /> Send Results via WhatsApp
                                    </button>
                                </div>
                                
                                <button 
                                    onClick={() => setShowReview(!showReview)}
                                    className="text-blue-600 hover:text-blue-800 text-sm font-medium underline mt-4 inline-block"
                                >
                                    {showReview ? "Hide Review" : "Review My Answers"}
                                </button>
                            </div>

                            {/* Review Section */}
                            {showReview && (
                                <div className="space-y-6">
                                    <h3 className="text-xl font-bold text-slate-800 px-2">Detailed Review</h3>
                                    {quizData.map((q, idx) => {
                                        const selectedAnsIndex = answers[idx];
                                        const isUnanswered = selectedAnsIndex === null;
                                        const isCorrect = !isUnanswered && q.options[selectedAnsIndex].isCorrect;
                                        const correctOptionIndex = q.options.findIndex(opt => opt.isCorrect);

                                        return (
                                            <div key={idx} className={`bg-white rounded-xl shadow p-6 border-l-4 ${isCorrect ? 'border-green-500' : 'border-red-500'}`}>
                                                <div className="flex justify-between items-start mb-4">
                                                    <span className="text-sm font-bold text-slate-500">Question {idx + 1}</span>
                                                    {isCorrect ? 
                                                        <span className="flex items-center text-green-600 text-sm font-medium"><Icon name="check-circle" size={16} className="mr-1"/> Correct (+{q.marks}m)</span> : 
                                                        <span className="flex items-center text-red-600 text-sm font-medium"><Icon name="x-circle" size={16} className="mr-1"/> Incorrect (0m)</span>
                                                    }
                                                </div>
                                                <p className="text-slate-800 font-medium mb-4">{q.question}</p>
                                                
                                                <div className="space-y-2 mb-4">
                                                    {q.options.map((opt, optIdx) => (
                                                        <div key={optIdx} className={`p-3 rounded-lg text-sm ${opt.isCorrect ? 'bg-green-50 border border-green-200 text-green-800' : selectedAnsIndex === optIdx ? 'bg-red-50 border border-red-200 text-red-800' : 'bg-slate-50 border border-slate-200 text-slate-500'}`}>
                                                            {opt.text}
                                                            {opt.isCorrect && <Icon name="check-circle" size={14} className="inline ml-2 text-green-600"/>}
                                                            {selectedAnsIndex === optIdx && !opt.isCorrect && <Icon name="x-circle" size={14} className="inline ml-2 text-red-600"/>}
                                                        </div>
                                                    ))}
                                                </div>

                                                {!isCorrect && (
                                                    <div className="mt-4 bg-blue-50 text-blue-900 p-4 rounded-lg text-sm">
                                                        <p className="mb-2"><strong>Teacher's Rationale: </strong>
                                                        {selectedAnsIndex !== null ? q.options[selectedAnsIndex].rationale : "Question was not answered. "}
                                                        {selectedAnsIndex !== null && !q.options[selectedAnsIndex].isCorrect && ` The correct answer is ${q.options[correctOptionIndex].text}. ${q.options[correctOptionIndex].rationale}`}
                                                        </p>

                                                        {/* Feature 2: Story Explanation Button */}
                                                        {!aiExplanations[idx] && !isAiExplanationLoading[idx] && (
                                                            <button 
                                                                onClick={() => handleAskHachiwareForStory(idx)}
                                                                className="mt-3 flex items-center px-4 py-2 bg-white border border-blue-200 text-blue-700 rounded-md hover:bg-blue-100 transition shadow-sm font-medium"
                                                            >
                                                                <Icon name="sparkles" size={16} className="mr-2 text-yellow-500" /> Ask Hachiware to explain with a story!
                                                            </button>
                                                        )}

                                                        {isAiExplanationLoading[idx] && (
                                                            <div className="mt-4 flex items-center text-blue-700 font-medium bg-white p-3 rounded border border-blue-100">
                                                                <Icon name="loader" size={16} className="mr-2" /> Hachiware is thinking of a story...
                                                            </div>
                                                        )}

                                                        {aiExplanations[idx] && (
                                                            <div className="mt-4 bg-white p-4 rounded-lg border border-blue-200 shadow-sm flex items-start">
                                                                <img src={MASCOT_IMAGE_URL} alt="Hachiware" className="w-10 h-10 rounded-full border-2 border-blue-100 mr-3 flex-shrink-0 object-cover mt-1" />
                                                                <div>
                                                                    <p className="text-xs font-bold text-blue-800 uppercase tracking-wider mb-1">Hachiware's Story</p>
                                                                    <p className="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">{aiExplanations[idx]}</p>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                        </div>
                    </div>
                );
            }

            // ----------------------------------------------------------------
            // SCREEN 2: ACTIVE QUIZ SCREEN
            // ----------------------------------------------------------------
            const currentQ = quizData[currentQuestionIndex];
            const answeredCount = answers.filter(a => a !== null).length;
            const isCurrentQuestionAnswered = answers[currentQuestionIndex] !== null;

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white shadow-sm px-4 py-3 sticky top-0 z-10">
                        <div className="max-w-3xl mx-auto flex justify-between items-center">
                            <div>
                                <p className="text-xs text-slate-500 font-medium">Student: {studentName}</p>
                                <h1 className="text-lg font-bold text-slate-800">PSLE Percentages</h1>
                            </div>
                            <div className="text-right flex flex-col items-end">
                                <div className="flex items-center text-slate-700 font-bold bg-slate-100 px-2 py-1 rounded-md mb-1 text-sm border border-slate-200">
                                    <Icon name="clock" size={14} className="mr-1" />
                                    {formatTime(elapsedSeconds)}
                                </div>
                                <p className="text-sm font-bold text-blue-600">{currentQuestionIndex + 1} of {quizData.length}</p>
                            </div>
                        </div>
                        <div className="max-w-3xl mx-auto mt-3 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div 
                                className="h-full bg-blue-600 transition-all duration-300" 
                                style={{ width: `${((currentQuestionIndex + 1) / quizData.length) * 100}%` }}
                            ></div>
                        </div>
                    </header>

                    <main className="flex-grow p-4 py-8 flex items-center justify-center">
                        <div className="max-w-2xl w-full">
                            
                            <div className="flex flex-wrap items-center gap-2 mb-4">
                                <span className="px-2.5 py-1 bg-blue-100 text-blue-700 text-xs font-semibold rounded-md">
                                    Level {currentQ.level}
                                </span>
                                <span className="px-2.5 py-1 bg-slate-200 text-slate-700 text-xs font-semibold rounded-md">
                                    {currentQ.marks} {currentQ.marks === 1 ? 'Mark' : 'Marks'}
                                </span>
                                <span className={`px-2.5 py-1 text-xs font-semibold rounded-md flex items-center ${currentQ.calculator ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                    {currentQ.calculator ? <Icon name="calculator" size={12} className="mr-1"/> : <Icon name="x-circle" size={12} className="mr-1"/>}
                                    {currentQ.calculator ? 'Calculator Allowed' : 'No Calculator'}
                                </span>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm p-6 md:p-8 mb-6 border border-slate-100">
                                <h2 className="text-xl md:text-2xl font-medium text-slate-800 leading-relaxed">
                                    {currentQ.question}
                                </h2>
                            </div>

                            <div className="space-y-3 mb-8">
                                {currentQ.options.map((option, index) => {
                                    const isSelected = answers[currentQuestionIndex] === index;
                                    return (
                                        <button
                                            key={index}
                                            onClick={() => handleSelectOption(index)}
                                            className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-center
                                                ${isSelected 
                                                    ? 'border-blue-600 bg-blue-50 text-blue-900 shadow-sm' 
                                                    : 'border-slate-200 bg-white text-slate-700 hover:border-blue-300 hover:bg-slate-50'
                                                }`}
                                        >
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center mr-4 flex-shrink-0
                                                ${isSelected ? 'border-blue-600' : 'border-slate-300'}`}
                                            >
                                                {isSelected && <div className="w-3 h-3 rounded-full bg-blue-600" />}
                                            </div>
                                            <span className="text-lg">{option.text}</span>
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Feature 1: Hint Area */}
                            <div className="mb-8">
                                {!showHint ? (
                                    <button 
                                        onClick={() => setShowHint(true)}
                                        className="flex items-center px-4 py-2 bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100 font-medium rounded-lg transition-colors shadow-sm"
                                    >
                                        <Icon name="help-circle" size={16} className="mr-2 text-amber-600" />
                                        Show Hint
                                    </button>
                                ) : (
                                    <div className="bg-amber-50 border border-amber-200 rounded-lg p-5 flex items-start shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-24 h-24 bg-amber-100 rounded-bl-full opacity-50 pointer-events-none"></div>
                                        <img 
                                            src={MASCOT_IMAGE_URL} 
                                            alt="Mascot Hint" 
                                            className="w-14 h-14 rounded-full border-2 border-amber-300 mr-4 flex-shrink-0 bg-white object-cover shadow-sm z-10"
                                        />
                                        <div className="z-10 w-full">
                                            <p className="text-xs font-bold text-amber-800 uppercase tracking-wider mb-2 flex items-center">
                                                Hachiware's Standard Hint
                                            </p>
                                            <p className="text-sm text-amber-900 leading-relaxed whitespace-pre-wrap mb-4">
                                                {currentQ.hint}
                                            </p>
                                            
                                            {/* Gemini AI Hint Section */}
                                            {!aiHintText && !isAiHintLoading && (
                                                <button 
                                                    onClick={handleAskHachiwareForHint}
                                                    className="flex items-center px-3 py-1.5 bg-white border border-amber-300 text-amber-700 hover:bg-amber-50 text-xs font-medium rounded transition-colors shadow-sm"
                                                >
                                                    <Icon name="sparkles" size={14} className="mr-1 text-yellow-500" />
                                                    Still stuck? Ask Hachiware for an extra AI hint!
                                                </button>
                                            )}

                                            {isAiHintLoading && (
                                                <div className="mt-3 flex items-center text-amber-700 text-sm">
                                                    <Icon name="loader" size={16} className="mr-2" /> Thinking of the perfect extra hint...
                                                </div>
                                            )}

                                            {aiHintText && (
                                                <div className="mt-3 pt-3 border-t border-amber-200">
                                                    <p className="text-xs font-bold text-amber-800 uppercase tracking-wider mb-2 flex items-center">
                                                        <Icon name="sparkles" size={12} className="mr-1 text-amber-600" /> Extra AI Hint
                                                    </p>
                                                    <p className="text-sm text-amber-900 leading-relaxed whitespace-pre-wrap">{aiHintText}</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>

                        </div>
                    </main>

                    <footer className="bg-white border-t border-slate-200 p-4 sticky bottom-0 z-10">
                        <div className="max-w-3xl mx-auto flex justify-between items-center">
                            <button
                                onClick={handlePrevious}
                                disabled={currentQuestionIndex === 0}
                                className={`flex items-center px-4 py-2 text-sm font-medium rounded-lg transition-colors
                                    ${currentQuestionIndex === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-600 hover:bg-slate-100'}`}
                            >
                                <Icon name="chevron-left" size={20} className="mr-1" /> Previous
                            </button>
                            
                            <button
                                onClick={handleNext}
                                disabled={!isCurrentQuestionAnswered}
                                className={`flex items-center px-6 py-2.5 text-white text-sm font-medium rounded-lg shadow-sm transition-colors ${
                                    !isCurrentQuestionAnswered ? 'bg-blue-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'
                                }`}
                            >
                                {currentQuestionIndex === quizData.length - 1 ? 'Finish Quiz' : 'Next'}
                                {currentQuestionIndex !== quizData.length - 1 && <Icon name="chevron-right" size={20} className="ml-1" />}
                            </button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
